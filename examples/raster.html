<!DOCTYPE html>
<!--
  Raster / GeoTIFF example (spec: "Raster / GeoTIFF — native COG layer").
  A Cloud-Optimized GeoTIFF (synthetic DEM over the Grand Canyon area)
  streams by HTTP Range request through <om-layer type="COGLayer"> — no
  conversion, no server. min/max set the rescale window and colormap picks
  a bundled sprite ramp; both are shader uniforms, so the buttons below
  restretch/recolor without refetching a single tile. The legend renders
  the colormap ramp automatically from the same attributes. The nodata
  notch in the corner (value -9999) is filtered to transparent.
-->
<html>
<head>
  <meta charset="utf-8" />
  <title>OnlyMapJS — raster / GeoTIFF example</title>
  <script type="module" src="https://esm.sh/@nika-js/onlymap@0.3.1"></script>
  <link rel="stylesheet" href="nav.css" />
</head>
<body>

  <header class="nav">
    <strong>OnlyMapJS examples</strong>
    <a href="index.html">Overview</a>
    <a href="widgets.html">Widgets</a>
    <a href="columnar.html">Columnar / GeoArrow</a>
    <a href="raster.html" class="current">Raster / GeoTIFF</a>
    <a href="terrain.html">Terrain</a>
  </header>

  <om-map center="[-112.15, 36.17]" zoom="10" basemap="positron">

    <om-layer id="elevation" type="COGLayer" label="Elevation (synthetic DEM)"
              src="./data/elevation.tif"
              min="0" max="1900" colormap="viridis" nodata="-9999"
              opacity="0.85"></om-layer>

    <!-- UNSTYLED path: no min/max/colormap — an 8-bit RGB COG renders
         through the layer's inferred default pipeline untouched. Toggle it
         on from the legend. -->
    <om-layer id="truecolor" type="COGLayer" label="Truecolor (synthetic, RGB)"
              src="./data/truecolor.tif" visible="false"></om-layer>

    <om-widget type="legend" title="Layers" position="top-right" interactive></om-widget>

    <!-- The manifest IS the state: restretch/recolor = attribute writes on
         the layer element (undoable via Cmd/Ctrl-Z like any manifest edit). -->
    <om-widget position="bottom-left">
      <style>
        .panel { background: #fff; color: #1f2937; padding: 10px 12px; border-radius: 8px;
                 box-shadow: 0 2px 10px rgba(0,0,0,.15); font: 12px system-ui, sans-serif; max-width: 280px; }
        .panel button { font: 12px system-ui, sans-serif; padding: 4px 8px; border: 1px solid #cbd2d9;
                        border-radius: 6px; background: #fff; cursor: pointer; margin: 2px 4px 2px 0; }
      </style>
      <div class="panel">
        <strong>Live restretch — uniforms, not refetches</strong>
        <div>
          <button data-cm="viridis">viridis</button>
          <button data-cm="terrain">terrain</button>
          <button data-cm="rdbu">rdbu</button>
        </div>
        <div>
          <button data-range="0,1900">full range</button>
          <button data-range="600,1200">mid-band stretch</button>
        </div>
      </div>
      <script type="om/widget">
        this.watch = [];
        this.render = () => {
          const layer = this.closest("om-map").querySelector("#elevation");
          for (const b of this.$$("button[data-cm]")) b.onclick = () => layer.setAttribute("colormap", b.dataset.cm);
          for (const b of this.$$("button[data-range]")) b.onclick = () => {
            const [min, max] = b.dataset.range.split(",");
            layer.setAttribute("min", min);
            layer.setAttribute("max", max);
          };
        };
      </script>
    </om-widget>

  </om-map>

</body>
</html>
