<!DOCTYPE html>
<!--
  Behaviors & overlays example (spec: "Behavior Engine", "Overlay Renderer",
  "Filtering"). Click a neighborhood for a rich popup, hover a bike rack for
  a tooltip cloned from a <template>, and drag the filter slider to change
  which racks are visible — all declarative, no custom script.
-->
<html>
<head>
  <meta charset="utf-8" />
  <title>OnlyMapJS — Behaviors &amp; overlays example</title>
  <script type="module" src="https://esm.sh/@nika-js/onlymap@0.1.1"></script>
  <link rel="stylesheet" href="nav.css" />
</head>
<body>

  <header class="nav">
    <strong>OnlyMapJS examples</strong>
    <a href="index.html">Overview</a>
    <a href="widgets.html">Widgets</a>
    <a href="behaviors-overlays.html" class="current">Behaviors &amp; overlays</a>
    <a href="basemap.html">Basemap</a>
    <a href="columnar.html">Columnar / GeoArrow</a>
    <a href="scenegraph.html">3D models</a>
    <a href="google-3d-tiles.html">Google 3D Tiles</a>
    <a href="google-3d-flyby.html">3D Flyby</a>
    <a href="ais.html">Live AIS</a>
    <a href="fleet.html">Fleet (polling)</a>
    <a href="story.html">Map story</a>
  </header>

  <om-map center="[-122.42, 37.77]" zoom="12">

    <om-layer id="regions" type="GeoJsonLayer"
                data="./data/regions.geojson"
                label="SF neighborhoods" color="#3388ff"
                filled stroked pickable
                get-line-color="[20,20,20]"
                line-width-min-pixels="2"></om-layer>

    <om-layer id="bikes" type="ScatterplotLayer"
                data="./data/bikes.json"
                label="Bike racks" color="#e6550d"
                get-position="[$lon, $lat]"
                get-radius="scale($size, sqrt, [3, 30], domain=[0, 100])"
                radius-units="pixels" pickable
                filter-field="size" filter-range="[0, 100]"></om-layer>

    <!-- Geo-anchored popup — tracks whatever was last clicked via
         anchor-from="selection". {{name}} is HTML-escaped by default. -->
    <om-overlay id="region-detail" anchor-from="selection" layer="regions" visible="false">
      <style>
        .popup { background: #fff; border-radius: 8px; padding: 10px 14px;
                 box-shadow: 0 4px 16px rgba(0,0,0,.2); font-size: 13px; min-width: 140px; }
        .close { float: right; cursor: pointer; opacity: .5; margin-left: 8px; }
      </style>
      <div class="popup">
        <span class="close" data-emit="hide-overlay" data-target="region-detail">✕</span>
        <strong>{{name}}</strong>
      </div>
    </om-overlay>

    <!-- Declarative event -> action wiring, one behavior per (event, layer) pair. -->
    <om-behavior on="click" layer="regions" action="show-overlay"
                   target="region-detail" anchor-offset="top-center"></om-behavior>
    <om-behavior on="hover" layer="bikes" action="show-tooltip"
                   template="#bike-tooltip"></om-behavior>

    <!-- Built-in "filter" widget: a slider bound to bikes' `size` filter.
         Emits filter-layer live -- filterRange is a plain prop, not an
         accessor, so this never touches updateTriggers. -->
    <om-widget type="filter" layer="bikes" field="size" title="Rack size"
                 position="top-right"></om-widget>

    <om-widget type="legend" title="Layers" interactive position="top-right"
                 style="margin-top: 130px;"></om-widget>

    <om-widget position="top-left">
      <style>
        .panel { background: #fff; padding: 10px 14px; border-radius: 8px;
                 box-shadow: 0 2px 10px rgba(0,0,0,.15); font-size: 13px; }
      </style>
      <div class="panel">
        <strong>Try it</strong><br/>
        Click a blue neighborhood for a popup.<br/>
        Hover an orange rack for a tooltip.<br/>
        Drag the filter slider (top-right) by size.
      </div>
    </om-widget>

  </om-map>

  <!-- Referenced by the hover behavior's template="#bike-tooltip". -->
  <template id="bike-tooltip">
    <div style="background:#222; color:#fff; padding:4px 8px; border-radius:4px; font:12px system-ui, sans-serif;">
      Rack size: {{size}}
    </div>
  </template>

</body>
</html>
