<!DOCTYPE html>
<!--
  3D models example (spec: HU1 curated schemas — ScenegraphLayer).
  ../data/box.glb is a tiny license-free GLB generated by
  a placeholder GLB, standing in for the output of a real asset
  pipeline: analysts converting domain formats server-side (IFC via
  ifcopenshell, meshes via trimesh, written with pygltflib — or any
  CAD → GLB route) get a web-standard asset the manifest renders with
  zero three.js boilerplate. See docs/3d-assets.md for the full recipe.

  Each data row instances the same GLB at a lng/lat with its own heading
  and per-axis scale — a block of "towers" south of Market. Hover one for
  a picked-model tooltip (picking works on 3D models like any layer).
-->
<html>
<head>
  <meta charset="utf-8" />
  <title>OnlyMapJS — 3D models example</title>
  <script type="module" src="https://esm.sh/onlymapjs@0.1.0"></script>
  <link rel="stylesheet" href="nav.css" />
</head>
<body>

  <header class="nav">
    <strong>OnlyMapJS examples</strong>
    <a href="index.html">Overview</a>
    <a href="widgets.html">Widgets</a>
    <a href="behaviors-overlays.html">Behaviors &amp; overlays</a>
    <a href="basemap.html">Basemap</a>
    <a href="columnar.html">Columnar / GeoArrow</a>
    <a href="scenegraph.html" class="current">3D models</a>
    <a href="ais.html">Live AIS</a>
    <a href="fleet.html">Fleet (polling)</a>
    <a href="story.html">Map story</a>
  </header>

  <deck-map center="[-122.399, 37.79]" zoom="15.5" pitch="55" bearing="20" basemap="maplibre">

    <!-- glTF is Y-up: roll 90 (the third orientation component) stands the
         model upright on the map — the standard ScenegraphLayer idiom. -->
    <deck-layer id="towers" type="ScenegraphLayer"
                scenegraph="./data/box.glb"
                label="Towers (GLB instances)" color="#8ca6cc"
                get-position="[$lon, $lat]"
                get-orientation="[0, $heading, 90]"
                get-scale="[$width, $height, $depth]"
                lighting="pbr" pickable>
      <script type="application/json">
        [
          { "name": "Alpha Tower",  "lon": -122.400, "lat": 37.790, "heading": 15, "width": 30, "depth": 30, "height": 120 },
          { "name": "Beta Block",   "lon": -122.398, "lat": 37.7905, "heading": 40, "width": 45, "depth": 25, "height": 60 },
          { "name": "Gamma Slab",   "lon": -122.3965, "lat": 37.7895, "heading": 0,  "width": 20, "depth": 50, "height": 90 },
          { "name": "Delta Annex",  "lon": -122.4005, "lat": 37.7885, "heading": 70, "width": 25, "depth": 25, "height": 40 },
          { "name": "Epsilon Spire","lon": -122.3975, "lat": 37.7912, "heading": 25, "width": 15, "depth": 15, "height": 150 }
        ]
      </script>
    </deck-layer>

    <deck-widget type="legend" title="Layers" position="top-right"></deck-widget>
    <deck-widget type="attribution" text="Model: generated box.glb (make-box-glb.mjs)" position="bottom-left"></deck-widget>

    <deck-behavior on="hover" layer="towers" action="show-tooltip"
                   template="#tower-tooltip"></deck-behavior>

  </deck-map>

  <template id="tower-tooltip">
    <div style="background:#222; color:#fff; padding:4px 8px; border-radius:4px; font:12px system-ui, sans-serif;">
      <b>{{name}}</b> — {{height}} m
    </div>
  </template>

</body>
</html>
